kind: Deployment
apiVersion: apps/v1
metadata: 
  name: deployment-billing

spec:
  replicas: 2
  selector:
    matchLabels:
      service: billing

  template:
    metadata:
      labels:
        service: billing

    spec:
      containers:
        - name: v1
          image: manishramdhave/billing:1.0
          ports:
            - containerPort: 8080
